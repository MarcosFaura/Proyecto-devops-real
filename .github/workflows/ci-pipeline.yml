name: Integración de Pipeline Continua (CI)

on:
  push:
   branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar código del repositorio
      uses: actions/checkout@v4

    - name: Configurar Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Compilar imagen Docker
      run: |
        docker build -t mi-api-python:test .
        echo "¡La imagen se ha compilado con éxito en la nube de Github!"
