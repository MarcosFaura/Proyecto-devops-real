name: Integración de Pipeline Continua (CI)

on:
  push:
   branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar código del repositorio
      uses: actions/checkout@v4

    - name: Configurar entorno de Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # === NUEVO PASO: Instalar lo necesario para probar la API ===
    - name: Instalar dependencias de pruebas
      run: |
        python -m pip install --upgrade pip
        pip install fastapi uvicorn pytest httpx

    # === NUEVO PASO: Ejecutar el test que acabamos de crear ===
    - name: Ejecutar Pruebas Unitarias (Pytest)
      run: |
        pytest tests/test_main.py

    - name: Configurar Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Iniciar sesión en DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_PASSWORD }}

    - name: Compilar y subir imagen
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/proyecto-real:latest
